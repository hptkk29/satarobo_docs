name: Deploy Docs → GitHub Pages

# Tự build & deploy site tài liệu (Docusaurus) lên GitHub Pages khi push main.
# Yêu cầu: Settings → Pages → Build and deployment → Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Chỉ chạy 1 deploy tại một thời điểm; không huỷ deploy đang chạy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        # Dùng npm ci nếu đã commit package-lock.json, ngược lại npm install.
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Build
        run: npm run build
        env:
          # url/baseUrl tự khớp với repo đang chạy (owner + tên repo).
          DOCS_ORG: ${{ github.repository_owner }}
          DOCS_REPO: ${{ github.event.repository.name }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
