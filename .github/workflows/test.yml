name: Build check (PR)

# Kiểm tra build site tài liệu trên mỗi pull request (không deploy).

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
